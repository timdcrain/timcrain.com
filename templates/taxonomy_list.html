{% extends "base.html" %}

{% block meta -%}
{%- set title = taxonomy.name -%}
{%- set description = "Post " ~ taxonomy.name -%}
{{ super() }}
{%- endblock meta %}

{% block content %}
<ul class="terms">
  {%- for term in terms %}
  <li><a href="{{ term.permalink | trim_start_matches(pat=config.base_url) | safe }}">{{ term.name }}</a></li>
  {%- endfor %}
</ul>
{% endblock content %}
